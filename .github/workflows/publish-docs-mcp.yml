# Publishes @datarecce/docs-mcp to npm.
#
# Manual trigger, fully automated bump + publish + tag + release. To release:
#   Actions → "Publish docs-mcp" → Run workflow → pick bump (patch/minor/major)
#   or: gh workflow run "Publish docs-mcp" -f bump=patch
#
# What the workflow does:
#   1. Mints a short-lived token from the recce-action-bot GitHub App
#   2. Computes next version and bumps package.json + package-lock.json
#      LOCALLY in the runner (no commit, no push yet)
#   3. Tests + builds against the bumped version
#   4. Publishes to npm via OIDC Trusted Publishing (provenance attested)
#   5. ONLY after publish succeeds: commits the bump to main, tags
#      docs-mcp-v<new-version>, pushes the tag, creates a GitHub Release
#
# Why this order: keeps main in sync with what is actually on npm. If any
# step before publish fails (deps, tests, build, OIDC, npm), main is
# untouched and a retry with the same bump produces the same version.
#
# Requires:
#   - npm Trusted Publisher configured for @datarecce/docs-mcp pointing at
#     this repo + workflow (no NPM_TOKEN needed — auth via OIDC)
#   - id-token: write permission for OIDC + provenance attestation
#   - contents: write permission (workflow-level fallback)
#   - main is protected by a Repository Ruleset. The recce-action-bot
#     GitHub App must be added to the ruleset's bypass list with
#     Contents: write permission on this repo.
#   - Secrets: RECCE_ACTION_BOT_CLIENT_ID, RECCE_ACTION_BOT_PRIVATE_KEY
name: Publish docs-mcp

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump applied to current package.json version'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Mint GitHub App token
        # Short-lived (1h) installation token from the recce-action-bot App.
        # Used for everything that needs to push to a protected main: the
        # post-publish bump commit, the tag, and the GitHub Release.
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RECCE_ACTION_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RECCE_ACTION_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity for App
        run: |
          git config user.name "recce-action-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        # npm Trusted Publishing (OIDC auth, no token) requires npm >= 11.5.1.
        # Node 20 ships with npm 10.x, so install a newer npm explicitly.
        run: npm install -g npm@latest

      - name: Compute next version (local bump, no commit yet)
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump }}
        working-directory: packages/recce-docs-mcp
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          # `npm version <type>` writes the new version to package.json +
          # package-lock.json and prints "v<new>" to stdout. With
          # --no-git-tag-version it does NOT touch git — the files are only
          # modified in the working tree. The commit/push happen later,
          # after publish succeeds.
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | tr -d 'v')
          TAG="docs-mcp-v$NEW_VERSION"
          echo "Computed next version: $OLD_VERSION -> $NEW_VERSION (bump=$BUMP)"

          if [ -n "$(git tag -l "$TAG")" ]; then
            echo "ERROR: tag $TAG already exists. Was this version already released?"
            exit 1
          fi

          echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: packages/recce-docs-mcp
        run: npm ci

      - name: Test
        working-directory: packages/recce-docs-mcp
        run: npm test

      - name: Build
        working-directory: packages/recce-docs-mcp
        run: npm run build

      - name: Publish to npm
        # Auth happens via OIDC (Trusted Publisher). No NPM_TOKEN needed.
        # If this step fails, main is untouched and the same `bump` input
        # will produce the same version on retry.
        working-directory: packages/recce-docs-mcp
        run: npm publish --provenance --access public

      - name: Commit version bump to main
        # Runs only after publish succeeds. The bumped files were modified
        # in the working tree back at the "Compute next version" step.
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
        working-directory: packages/recce-docs-mcp
        run: |
          git add package.json package-lock.json
          git commit -m "chore(docs-mcp): bump to v$NEW_VERSION"
          git push origin main

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "@datarecce/docs-mcp v$NEW_VERSION"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: '@datarecce/docs-mcp v${{ steps.bump.outputs.new-version }}'
          generate_release_notes: true
          token: ${{ steps.app-token.outputs.token }}
