# Publishes @datarecce/docs-mcp to npm when a docs-mcp-v* tag is pushed.
#
# Triggered by:
#   scripts/release.sh (which creates and pushes the tag)
#   or a manual `git tag docs-mcp-vX.Y.Z && git push origin docs-mcp-vX.Y.Z`
#
# Requires:
#   - NPM_TOKEN secret (npm automation token with publish access to @datarecce)
#   - id-token: write permission for provenance attestation
name: Publish docs-mcp

on:
  push:
    tags:
      - 'docs-mcp-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. docs-mcp-v0.1.0)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/recce-docs-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#docs-mcp-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: '@datarecce/docs-mcp v${{ steps.version.outputs.version }}'
          generate_release_notes: true
