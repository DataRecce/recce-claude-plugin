# Publishes @datarecce/docs-mcp to npm.
#
# Manual trigger, fully automated bump + publish + tag + release. To release:
#   Actions → "Publish docs-mcp" → Run workflow → pick bump (patch/minor/major)
#   or: gh workflow run "Publish docs-mcp" -f bump=patch
#
# What the workflow does:
#   1. Mints a short-lived token from the recce-action-bot GitHub App
#   2. Bumps packages/recce-docs-mcp/package.json by the chosen semver level,
#      commits as the App, pushes to main
#   3. Tests + builds
#   4. Publishes to npm via OIDC Trusted Publishing (provenance attested)
#   5. Tags the commit as docs-mcp-v<new-version> and pushes the tag as the App
#   6. Creates a GitHub Release with auto-generated notes
#
# Requires:
#   - npm Trusted Publisher configured for @datarecce/docs-mcp pointing at
#     this repo + workflow (no NPM_TOKEN needed — auth via OIDC)
#   - id-token: write permission for OIDC + provenance attestation
#   - contents: write permission (workflow-level fallback)
#   - main is protected by a Repository Ruleset. The recce-action-bot
#     GitHub App must be added to the ruleset's bypass list with
#     Contents: write permission on this repo.
#   - Secrets: RECCE_ACTION_BOT_CLIENT_ID, RECCE_ACTION_BOT_PRIVATE_KEY
name: Publish docs-mcp

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump applied to current package.json version'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Mint GitHub App token
        # Short-lived (1h) installation token from the recce-action-bot App.
        # Used for everything that needs to push to a protected main: the
        # bump commit, the tag, and the GitHub Release.
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RECCE_ACTION_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RECCE_ACTION_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        # npm Trusted Publishing (OIDC auth, no token) requires npm >= 11.5.1.
        # Node 20 ships with npm 10.x, so install a newer npm explicitly.
        run: npm install -g npm@latest

      - name: Configure git identity for App
        run: |
          # GitHub Apps commit as <app-slug>[bot] <app-id>+<app-slug>[bot]@users.noreply.github.com
          # The bot user id resolves once the app is installed; use the
          # app-token step's installation id via the noreply email pattern.
          git config user.name "recce-action-bot[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Bump package.json and push to main
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump }}
        working-directory: packages/recce-docs-mcp
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          # `npm version <type>` writes the new version to package.json +
          # package-lock.json and prints "v<new>" to stdout.
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | tr -d 'v')
          TAG="docs-mcp-v$NEW_VERSION"
          echo "Bumping package.json: $OLD_VERSION -> $NEW_VERSION (bump=$BUMP)"

          # Sanity check: tag for the computed version must not already exist.
          # `git tag -l` is plumbing-safe in a partially-fetched checkout
          # (fetch-depth: 0 already covers us, but this is defensive).
          if [ -n "$(git tag -l "$TAG")" ]; then
            echo "ERROR: tag $TAG already exists. Was this version already released?"
            exit 1
          fi

          git add package.json package-lock.json
          git commit -m "chore(docs-mcp): bump to v$NEW_VERSION"
          git push origin main

          echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: packages/recce-docs-mcp
        run: npm ci

      - name: Test
        working-directory: packages/recce-docs-mcp
        run: npm test

      - name: Build
        working-directory: packages/recce-docs-mcp
        run: npm run build

      - name: Publish to npm
        # Auth happens via OIDC (Trusted Publisher). No NPM_TOKEN needed.
        # --provenance is implied when publishing via Trusted Publishing, but
        # passing it explicitly is harmless and keeps intent clear.
        working-directory: packages/recce-docs-mcp
        run: npm publish --provenance --access public

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new-version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "@datarecce/docs-mcp v$NEW_VERSION"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: '@datarecce/docs-mcp v${{ steps.bump.outputs.new-version }}'
          generate_release_notes: true
          token: ${{ steps.app-token.outputs.token }}
