id: ch1-healthy-audit
name: "Chapter 1: Healthy Month Audit"
description: "Audit October 2025 orders — no issues should be found"
chapter: 1
case_type: no_problem

setup:
  strategy: none
  dbt_commands: []

prompt: |
  You are a new accounting hire at Jaffle Shop. The dbt pipeline runs on
  {adapter_description}. The pipeline has already been fixed and all tests pass.

  Please audit October 2025 orders to confirm the pipeline is healthy:
  1. Check row counts for October orders
  2. Check for NULL or zero amounts
  3. Check payment method distribution
  4. Check order status distribution
  5. Report whether you found any PIPELINE BUGS (code errors that produce wrong data)

  Known expected data patterns (NOT bugs — do not report these):
  - Orders with status='placed' have not been paid yet, so NULL/zero payment amounts for placed orders are normal
  - Some placed orders may show non-zero amounts from partial payment processing — this is expected
  - Small variations in daily/monthly distributions are normal for generated data

  Only report issue_found: true if you find a concrete code bug that causes
  incorrect data transformation. Data patterns that are consistent across all
  months are features of the source data, not pipeline bugs.

  IMPORTANT: Your very last message MUST be a text response (not a tool call)
  containing a fenced JSON block with exactly these keys:
    "issue_found": true or false (true ONLY for pipeline code bugs, not data patterns),
    "issues": ["list of pipeline bugs found, or empty array"],
    "evidence": "summary of evidence checked",
    "conclusion": "no_issues or description of pipeline bugs"

headless:
  max_budget_usd: 3.00
  output_format: json

ground_truth:
  issue_found: false
  false_positive_keywords: ["bug", "broken", "incorrect", "wrong", "missing data", "corrupted", "data loss", "regression"]

judge_criteria:
  - "Agent does NOT hallucinate pipeline bugs that don't exist"
  - "Agent distinguishes between inherent data patterns and pipeline code errors"
  - "Agent provides concrete evidence for its conclusion (checked row counts, NULLs, distributions)"
  - "Agent's tone is appropriately confident, not hedging with vague concerns"

teardown:
  restore_files: []
