id: data-002-cogs-food-only
name: "COGS Miscalculation"
description: "order_cost filtered to food-only supply costs — drink supply costs (59% of COGS) omitted"
github_issue: https://github.com/DataRecce/jaffle-shop-simulator/issues/2
layer: review
difficulty: medium
stakeholder: management
case_type: problem_exists

story: |
  The VP of Operations (P0) asked the team to review COGS accuracy in the orders pipeline.
  A teammate "optimized" the order_items_summary CTE to only sum supply_cost for food items
  (CASE WHEN is_food_item), claiming drink items have negligible supply costs.
  Code review approved — the CASE WHEN pattern is standard and the PR says "optimization".
  But drink supply costs account for ~59% of total COGS. The change makes order_cost
  systematically too low for 643,875 orders (98% — all orders with at least one drink item).

environment:
  repo: DataRecce/jaffle-shop-simulator
  adapter: duckdb

setup:
  strategy: git_patch
  patch_reverse_file: scenarios/v2/patches/data-002-cogs-food-only.patch
  skip_context: false

prompt:
  template: prompts/review.md
  vars:
    stakeholder_name: "VP of Operations (P0, Management)"
    stakeholder_request: "Review COGS accuracy in the orders pipeline"
    pr_description: "Optimize COGS calculation — filter to food supply costs for performance"

headless:
  max_budget_usd: 5.00
  output_format: json

ground_truth:
  issue_found: true
  issue_type: data_drift
  root_cause_keywords: ["supply", "cost", "drink", "food", "COGS", "order_cost", "is_food_item"]
  impacted_models: ["orders"]
  not_impacted_models: ["customers", "order_items"]
  affected_row_count: 643875
  dashboard_impact: false
  detection_requires: data_comparison

judge_criteria:
  - "Agent identifies the supply_cost aggregation bug through DATA comparison, not just reading the formula"
  - "Agent recognizes that order_cost excludes drink supply costs due to the is_food_item filter"
  - "Agent correctly identifies that customers model is NOT impacted (customers doesn't use order_cost)"
  - "Agent correctly identifies that the Executive Dashboard is NOT impacted (order_cost is not a dashboard column)"

teardown:
  restore_files: ["models/marts/orders.sql"]
