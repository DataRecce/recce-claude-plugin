id: r1-tax-calculation-drift
name: "R1: Subtotal Tax Deduction"
description: "subtotal changed to subtract tax_paid — raw subtotal is already pre-tax, so this double-deducts tax"
layer: review
difficulty: easy
stakeholder: accounting
case_type: problem_exists

story: |
  The Accounting Manager (P1) requested that subtotal be standardized as a pre-tax amount
  across all reports. A teammate modified stg_orders to derive subtotal as
  `subtotal - tax_paid`, claiming the raw data includes tax in subtotal.
  Code review approved — the formula is mathematically correct for the stated purpose.
  But the raw subtotal is ALREADY pre-tax (order_total = subtotal + tax_paid).
  The change double-deducts tax, making subtotal systematically too low for 654,502 orders
  (all orders with non-zero tax). The values propagate through orders into customers.

environment:
  repo: DataRecce/jaffle-shop-simulator
  adapter: duckdb

setup:
  strategy: git_patch
  patch_reverse_file: scenarios/v2/patches/r1-tax-calculation-drift.patch
  skip_context: false

prompt:
  template: prompts/review.md
  vars:
    stakeholder_name: "Accounting Manager (P1)"
    stakeholder_request: "Standardize subtotal as pre-tax amount across all reports"
    pr_description: "Fix subtotal — raw data includes tax in subtotal, subtract tax_paid for accurate pre-tax amount"

headless:
  max_budget_usd: 5.00
  output_format: json

ground_truth:
  issue_found: true
  issue_type: data_drift
  root_cause_keywords: ["subtotal", "tax", "deduct", "pre-tax", "double", "already"]
  impacted_models: ["stg_orders", "orders", "customers"]
  not_impacted_models: ["order_items", "products"]
  affected_row_count: 654502
  dashboard_impact: true
  detection_requires: data_comparison

judge_criteria:
  - "Agent identifies that raw subtotal is already pre-tax through DATA comparison, not just code reading"
  - "Agent recognizes that subtotal - tax_paid double-deducts tax from the amount"
  - "Agent correctly identifies that customers model IS impacted (lifetime_spend_pretax uses subtotal)"
  - "Agent correctly identifies that the Executive Dashboard IS impacted (subtotal is a dashboard column)"

teardown:
  restore_files: ["models/staging/stg_orders.sql"]
